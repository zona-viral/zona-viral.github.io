<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZonaViral</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="appbar">
  <div class="brand">
    <span class="logo">V</span>
    <span>Zona-Viral</span>
  </div>
</header>

<main class="wrap">

  <div class="video-container">

    <!-- 
      OVERLAY LAYER
      Fungsi:
      - Menangkap klik pertama user
      - Karena iframe tidak bisa ditangkap kliknya
    -->
    <div id="clickLayer">
      <button id="playBtn">▶ Tonton Video</button>
    </div>

    <!-- 
      IFRAME VIDEO
      Note:
      - Tidak bisa dikontrol eventnya
      - Jadi kita pakai overlay di atasnya
    -->
    <iframe
      src="https://aceimg.com/upload/?f=c5b01a9e8.mp4"
      width="100%"
      height="700"
      frameborder="0"
      allowfullscreen>
    </iframe>

  </div>

</main>

<script src="ads.js"></script>
</body>
</html>
