<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vudol Player</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="appbar">
  <div class="brand">Vudol</div>
</header>

<main class="wrap">

  <!-- ================= VIDEO BOX ================= -->
  <div class="video-box">

    <!-- IFRAME VIDEO (STABIL) -->
    <iframe
      id="videoFrame"
      src=""
      frameborder="0"
      allowfullscreen>
    </iframe>

    <!-- OVERLAY PLAY BUTTON -->
    <div id="overlay" class="overlay">
      <button id="playBtn">▶ Play Video</button>
    </div>

  </div>

  <!-- ================= ADS AREA ================= -->

  <!-- 🔵 NATIVE ADS -->
  <div id="native-ad"></div>

  <!-- 🟠 BANNER ADS -->
  <div id="banner-ad"></div>

</main>

<!-- ADS LOGIC -->
<script src="ads.js"></script>

</body>
</html>
