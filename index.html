<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Video Player</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- ================= VIDEO ================= -->
  <div class="video-box">

    <!-- VIDEO ASLI (R2 STREAM) -->
    <video id="video" controls preload="metadata" playsinline>
      <source src="https://pub-9369d940398a462fa52f1de2377001dc.r2.dev/amaliaputri97361.mp4" type="video/mp4">
    </video>

    <!-- OVERLAY BUTTON (trigger ads) -->
    <div id="overlay" class="overlay">
      <button id="playBtn">▶ Play Video</button>
    </div>

  </div>

  <!-- ================= ADS AREA ================= -->

  <!-- 🔵 NATIVE BANNER (Adsterra) -->
  <div id="native-ad"></div>

  <!-- 🟠 IFRAME BANNER (Adsterra) -->
  <div id="banner-ad"></div>

</div>

<!-- ADS LOGIC (SEMUA LINK ADA DI SINI) -->
<script src="ads.js"></script>

</body>
</html>
